hydra:
  run:
    dir: ckpt/tmp
  job:
    chdir: True

data: safe

wandb:
  project: safe-udlm
  name: null

loader:
  global_batch_size: 2048
  batch_size: ${div_up:${.global_batch_size}, ${eval:${trainer.devices} * ${trainer.num_nodes}}}
  num_workers: 32
  pin_memory: True

optim:
  weight_decay: 0
  lr: 3e-4
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8

trainer:
  _target_: lightning.Trainer
  accelerator: cuda
  num_nodes: 1
  devices: ${device_count:}
  accumulate_grad_batches: ${div_up:${loader.global_batch_size}, ${eval:${trainer.devices} * ${loader.batch_size} * ${trainer.num_nodes}}}
  gradient_clip_val: 1.0
  precision: 'bf16'
  max_steps: 50000
  log_every_n_steps: 10

model:
  attention_probs_dropout_prob: 0.1
  classifier_dropout: null
  hidden_act: 'gelu'
  hidden_dropout_prob: 0.1
  hidden_size: 768
  initializer_range: 0.02
  intermediate_size: 3072
  layer_norm_eps: 1e-12
  max_position_embeddings: 256
  model_type: 'bert'
  num_attention_heads: 12
  num_hidden_layers: 12
  pad_token_id: 3
  position_embedding_type: 'absolute'
  time_conditioning: True
  time_embedding_size: 256
  torch_dtype: 'float32'
  type_vocab_size: 2
  vocab_size: 1880

noise:
  eps: ${training.sampling_eps}

diffusion:
  freeze_special_tokens: True
  zero_recon_loss: True

sampling:
  steps: 128
  eps: ${training.sampling_eps}
  final_denoise: True

# Maximal Update Parameterization (muP). See src/safe_udlm/mup.py.
# Workflow:
#   1. Enable muP and set base_hidden_size to the small model's width.
#   2. Sweep optim.lr while training with model.hidden_size = base_hidden_size
#      (and intermediate_size kept at its usual ratio, e.g. 4x).
#   3. Scale up model.hidden_size / model.intermediate_size without changing
#      optim.lr; muP rescales init, LR, and output logits automatically.
# Disabled by default -- leaves the standard training dynamics unchanged.
mup:
  enabled: False
  base_hidden_size: 128

training:
  ema: 0.9999
  antithetic_sampling: True
  sampling_eps: 1e-3
  global_mean_loss: True
  # All token losses are summed and divided by total token count: sum(all_tokens)/count(all_tokens)
  # Examples with more tokens (longer sequences) implicitly contribute more to the loss
  # It's weighted by sequence length
  use_bracket_safe: False
  warmup_steps: 4000

eval_callback:
  eval_every_n_steps: 10000   # run de-novo eval every N training steps
  num_samples: 256             # molecules to attempt per eval
  softmax_temp: 0.8            # de-novo recommended value (HYPERPARAMETERS.md)
  randomness: 1.0
  min_add_len: 50
  qed_threshold: 0.6           # quality = QED >= threshold AND SA <= threshold
  sa_threshold: 4.0

callback:
  _target_: lightning.pytorch.callbacks.ModelCheckpoint
  dirpath: ${cwd:}/checkpoints
  filename: '{step}'
  save_top_k: -1  # to save every n train steps
  auto_insert_metric_name: False
  enable_version_counter: False
  every_n_train_steps: 5000
